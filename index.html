            </div>

      </div>}
    </div>

}

function ExploreTab({onNavigate}){
  const{t}=useI18n();
  const[v,sV]=useState(false);const[query,sQ]=useState("");const[followedIds,sFollowed]=useState(["u2"]);const[savedPairs,sSaved]=useState([]);const[viewUser,sViewUser]=useState(null);const[showSaved,sShowSaved]=useState(false);
  useEffect(()=>{const t2=setTimeout(()=>sV(true),80);return()=>clearTimeout(t2);},[]);

  const results=query.length>=1?MOCK_USERS.filter(u=>u.username.toLowerCase().includes(query.toLowerCase())||u.displayName.toLowerCase().includes(query.toLowerCase())):MOCK_USERS;
  const toggleFollow=id=>sFollowed(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]);
  const toggleSave=pair=>sSaved(s=>s.find(p=>p.id===pair.id)?s.filter(p=>p.id!==pair.id):[...s,pair]);

  // User profile overlay

    <UserProfile user={viewUser} onBack={()=>sViewUser(null)} isFollowed={followedIds.includes(viewUser.id)} onToggleFollow={()=>toggleFollow(viewUser.id)} savedPairs={savedPairs} onToggleSave={toggleSave} isSaved={isSaved}/>
  );

  return(<div style={{position:"relative"}}>
    <GH onNavigate={onNavigate}/>
    <FI visible={v} delay={0}><div style={{padding:"52px 22px 0"}}>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>

      </div>
    </div></FI>

      {/* Search */}

        </div>
      </FI>

      {/* Saved pairs panel */}
      {showSaved&&<FI visible={v} delay={0}>
        <G style={{padding:"18px",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><SL>{t("savedPairs")}</SL><div onClick={()=>sShowSaved(false)} style={{fontSize:11,color:T.textMuted,cursor:"pointer",fontFamily:T.font}}>✕</div></div>

function SplashScreen({onDone}){
  const[phase,sPhase]=useState(0);
  // phase 0: black screen (0-400ms)
  // phase 1: green sunrise band appears at center, thin (400-1000ms) — frame 2
  // phase 2: green band expands upward to fill top half (1000-1600ms) — frame 3
  // phase 3: S starts emerging from horizon, small elliptical shape (1600-2000ms) — frame 4
  // phase 4: S scales up to full size with split effect (2000-2800ms) — frame 5→6
  // phase 5: hold final + SOLAR text (2800-3400ms)
  // phase 6: fade out (3400-3800ms)
  useEffect(()=>{
    const timers=[
      setTimeout(()=>sPhase(1),400),
      setTimeout(()=>sPhase(2),1000),
      setTimeout(()=>sPhase(3),1600),
      setTimeout(()=>sPhase(4),2000),
      setTimeout(()=>sPhase(5),2800),
      setTimeout(()=>sPhase(6),3400),
      setTimeout(()=>onDone(),3800),
    ];
    return()=>timers.forEach(clearTimeout);
  },[]);

  // Green band height: 0 → thin strip → full top half
  const bandHeight = phase===0?0:phase===1?8:phase>=2?50:0;
  // Band top position (centered → top aligned)
  const bandTop = phase===0?50:phase===1?46:phase>=2?0:50;
  // S scale: 0 → small → full
  const sScale = phase<3?0:phase===3?0.3:phase>=4?1:0;
  // S opacity
  const sOpacity = phase<3?0:phase===3?0.6:phase>=4?1:0;

  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:phase>=6?0:1,transition:"opacity 0.4s ease"}}>

      {/* Main icon container */}
      <div style={{width:160,height:160,borderRadius:36,overflow:"hidden",position:"relative"}}>

        {/* Black base */}
        <div style={{position:"absolute",inset:0,background:T.bg}}/>

        {/* Green sunrise band — grows from center strip to full top half */}
        <div style={{
          position:"absolute",
          left:0,width:"100%",
          top:`${bandTop}%`,
          height:`${bandHeight}%`,
          background:T.accent,
          borderRadius:phase===1?"50%/100%":"0",
          transition:phase===0?"none":phase===1?"all 0.6s cubic-bezier(0.22,1,0.36,1)":"all 0.6s cubic-bezier(0.22,1,0.36,1)",
        }}/>

        {/* S letter — emerges from horizon and scales up */}
        <div style={{
          position:"absolute",inset:0,
          display:"flex",alignItems:"center",justifyContent:"center",
          transform:`scale(${sScale})`,
          opacity:sOpacity,
          transition:phase<3?"none":"all 0.8s cubic-bezier(0.22,1,0.36,1)",
        }}>
          <svg width="160" height="160" viewBox="0 0 160 160">
            <defs>
              <clipPath id="spTop"><rect x="0" y="0" width="160" height="80"/></clipPath>
              <clipPath id="spBot"><rect x="0" y="80" width="160" height="80"/></clipPath>
            </defs>
            {/* S black on green (top half) */}
            <g clipPath="url(#spTop)">
              <text x="80" y="126" textAnchor="middle" fontFamily="'Outfit', 'Arial Black', sans-serif" fontSize="155" fontWeight="900" fill={T.bg}>S</text>
            </g>
            {/* S green on black (bottom half) */}
            <g clipPath="url(#spBot)">
              <text x="80" y="126" textAnchor="middle" fontFamily="'Outfit', 'Arial Black', sans-serif" fontSize="155" fontWeight="900" fill={T.accent}>S</text>
            </g>
          </svg>
        </div>

        {/* Horizon line — subtle separator */}
        <div style={{
          position:"absolute",top:"50%",left:0,width:"100%",height:2,
          background:T.bg,
          transform:phase>=2?"scaleX(1)":"scaleX(0)",
          transition:"transform 0.5s cubic-bezier(0.22,1,0.36,1)",
          transformOrigin:"center",zIndex:2,
          opacity:phase>=4?1:0,
        }}/>
      </div>

      {/* SOLAR text + tagline */}
      <div style={{marginTop:28,opacity:phase>=5?1:0,transform:phase>=5?"translateY(0)":"translateY(20px)",transition:"all 0.6s cubic-bezier(0.22,1,0.36,1)"}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,fontFamily:T.fontDisplay,letterSpacing:8,textAlign:"center"}}>SOLAR</div>
        <div style={{fontSize:11,color:T.textMuted,fontFamily:T.font,textAlign:"center",marginTop:8,letterSpacing:2}}>Your private sneaker universe</div>
      </div>

      {/* Loading bar */}
      <div style={{position:"absolute",bottom:80,width:140,height:2,borderRadius:1,background:"rgba(255,255,255,0.06)",overflow:"hidden",opacity:phase>=5?1:0,transition:"opacity 0.3s ease"}}>
        <div style={{height:"100%",borderRadius:1,background:T.accent,width:phase>=5?"100%":"0%",transition:"width 0.8s cubic-bezier(0.22,1,0.36,1)"}}/>
      </div>

      {/* Publisher */}
      <div style={{position:"absolute",bottom:44,fontSize:10,color:T.textMuted,fontFamily:T.font,letterSpacing:1.5,opacity:phase>=5?0.4:0,transition:"opacity 0.5s ease"}}>[12:12]</div>
    </div>
  );
}

          <button onClick={()=>sMode("signup")} style={{
            width:"100%",padding:"16px 0",borderRadius:16,border:"none",cursor:"pointer",
            background:`linear-gradient(135deg,${T.accent} 0%,${T.accentAlt} 100%)`,
            color:T.bg,fontSize:15,fontWeight:700,fontFamily:T.font,marginBottom:12,
            boxShadow:"0 6px 24px rgba(181,255,43,0.2)",
          }}>Create Account</button>

          <button onClick={()=>sMode("login")} style={{
            width:"100%",padding:"16px 0",borderRadius:16,cursor:"pointer",
            border:`1px solid ${T.surfaceBorder}`,background:T.surface,
            color:T.text,fontSize:15,fontWeight:600,fontFamily:T.font,
          }}>Log In</button>
        </div>

        <div style={{marginTop:24,fontSize:11,color:T.textMuted,fontFamily:T.font}}>
          By continuing, you agree to our Terms of Service
        </div>
      </div>
    </div>
  );

  // Login / Signup form
  const isLogin = mode==="login";
  return(
    <div style={{position:"fixed",inset:0,zIndex:9998,background:T.bg,display:"flex",flexDirection:"column",padding:"0 28px",overflowY:"auto"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <style>{`html,body{margin:0;padding:0;background:#08080c}*{box-sizing:border-box}input::placeholder{color:rgba(255,255,255,0.2)}`}</style>

      <div style={{maxWidth:360,width:"100%",margin:"0 auto",paddingTop:60}}>

        {/* Back button */}
        <button onClick={()=>sMode("welcome")} style={{
          width:38,height:38,borderRadius:"50%",border:`1px solid ${T.surfaceBorder}`,
          background:T.surface,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:32,
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="2" strokeLinecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>

        <div style={{fontSize:28,fontWeight:800,color:T.text,fontFamily:T.fontDisplay,letterSpacing:-0.5}}>{isLogin?"Welcome back":"Create account"}</div>
        <div style={{fontSize:13,color:T.textSecondary,fontFamily:T.font,marginTop:6,marginBottom:32}}>{isLogin?"Log in to your SOLAR account":"Join the sneaker universe"}</div>

        {/* Social login buttons */}
        {socialBtn(googleIcon,"Continue with Google","#ffffff","#333","#ddd")}
        {socialBtn(appleIcon,"Continue with Apple","#000000","#ffffff","#333")}
        {socialBtn(fbIcon,"Continue with Facebook","#1877F2","#ffffff","#1877F2")}

        {/* Divider */}
        <div style={{display:"flex",alignItems:"center",gap:16,margin:"20px 0"}}>
          <div style={{flex:1,height:1,background:T.surfaceBorder}}/>
          <div style={{fontSize:11,color:T.textMuted,fontFamily:T.font}}>or</div>
          <div style={{flex:1,height:1,background:T.surfaceBorder}}/>
        </div>

        {/* Email form */}
        {!isLogin&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:T.textSecondary,fontFamily:T.font,marginBottom:6}}>Display Name</div>
          <input type="text" value={name} onChange={e=>sName(e.target.value)} placeholder="Julius"
            style={{width:"100%",boxSizing:"border-box",padding:"13px 14px",background:T.surface,border:`1px solid ${T.surfaceBorder}`,borderRadius:14,color:T.text,fontSize:14,fontFamily:T.font,outline:"none"}}/>
        </div>}

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:T.textSecondary,fontFamily:T.font,marginBottom:6}}>Email</div>
          <input type="email" value={email} onChange={e=>sEmail(e.target.value)} placeholder="you@email.com"
            style={{width:"100%",boxSizing:"border-box",padding:"13px 14px",background:T.surface,border:`1px solid ${T.surfaceBorder}`,borderRadius:14,color:T.text,fontSize:14,fontFamily:T.font,outline:"none"}}/>
        </div>

        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:600,color:T.textSecondary,fontFamily:T.font,marginBottom:6}}>Password</div>
          <input type="password" value={pass} onChange={e=>sPass(e.target.value)} placeholder="Min. 8 characters"
            style={{width:"100%",boxSizing:"border-box",padding:"13px 14px",background:T.surface,border:`1px solid ${T.surfaceBorder}`,borderRadius:14,color:T.text,fontSize:14,fontFamily:T.font,outline:"none"}}/>
        </div>

        {isLogin&&<div style={{textAlign:"right",marginBottom:20}}>
          <span style={{fontSize:11,color:T.accent,fontFamily:T.font,cursor:"pointer"}}>Forgot password?</span>
        </div>}

        <button onClick={()=>onAuth()} style={{
          width:"100%",padding:"16px 0",borderRadius:16,border:"none",cursor:"pointer",
          background:`linear-gradient(135deg,${T.accent} 0%,${T.accentAlt} 100%)`,
          color:T.bg,fontSize:15,fontWeight:700,fontFamily:T.font,marginTop:isLogin?12:20,
          boxShadow:"0 6px 24px rgba(181,255,43,0.2)",
        }}>{isLogin?"Log In":"Create Account"}</button>

        {/* Switch mode */}
        <div style={{textAlign:"center",marginTop:24,marginBottom:40,fontSize:13,color:T.textSecondary,fontFamily:T.font}}>
          {isLogin?"Don't have an account? ":"Already have an account? "}
          <span onClick={()=>sMode(isLogin?"signup":"login")} style={{color:T.accent,fontWeight:700,cursor:"pointer"}}>{isLogin?"Sign Up":"Log In"}</span>
        </div>
      </div>
    </div>
  );
}

function SoularApp(){
  const[activeTab,sAT]=useState("home");
  const[isPremium,sIP]=useState(false);
  const[showPW,sSPW]=useState(false);
  const[lang,sLang]=useState(()=>detectLang());
  const[splashDone,sSplash]=useState(false);
  const[authed,sAuthed]=useState(false);

  const t=(key,params={})=>{let str=TR[lang]?.[key]||TR.en[key]||key;Object.entries(params).forEach(([k,v])=>{str=str.replace(`{${k}}`,v);});return str;};

  if(!splashDone) return(
    <div>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <style>{`html,body{margin:0;padding:0;background:#08080c;overflow:hidden}#root{height:100vh;height:100dvh}`}</style>
      <SplashScreen onDone={()=>sSplash(true)}/>
    </div>
  );

  if(!authed) return <AuthScreen onAuth={()=>sAuthed(true)}/>;

  return(
    <I18nCtx.Provider value={{lang,setLang:sLang,t}}>
    <PremiumCtx.Provider value={{isPremium,showPaywall:()=>sSPW(true),togglePremium:()=>sIP(p=>!p)}}>
      <div id="soular-root" style={{background:T.bg,fontFamily:T.font,maxWidth:430,margin:"0 auto",paddingBottom:90}}>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
        <style>{`
html{height:auto;background:#08080c}
body{margin:0;padding:0;background:#08080c;font-family:'DM Sans',sans-serif;min-height:100vh;min-height:100dvh}
#root{min-height:100vh;min-height:100dvh}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
.hide-sb::-webkit-scrollbar{display:none}.hide-sb{scrollbar-width:none;-ms-overflow-style:none}
input,textarea,button{font-family:inherit}
@supports(padding:env(safe-area-inset-top)){body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}}
@keyframes fit{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.soular-glow{position:fixed;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(181,255,43,0.04) 0%,transparent 65%);pointer-events:none;z-index:0}
        `}</style>
        <div className="soular-glow"/>
        <div key={activeTab} style={{animation:"fit 0.4s ease",position:"relative",zIndex:1}}>
          {activeTab==="home"&&<HomeTab onNavigate={sAT}/>}
          {activeTab==="collection"&&<CollectionTab onNavigate={sAT}/>}
          {activeTab==="add"&&<AddTab onNavigate={sAT}/>}
          {activeTab==="explore"&&<ExploreTab onNavigate={sAT}/>}
          {activeTab==="insights"&&<InsightsTab onNavigate={sAT}/>}
          {activeTab==="profile"&&<ProfileTab/>}
        </div>
        <BNav active={activeTab} setActive={sAT}/>
        {showPW&&<Paywall onClose={()=>sSPW(false)} onSubscribe={()=>sIP(true)}/>}
      </div>
    </PremiumCtx.Provider>
    </I18nCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SoularApp/>);
</script></body></html>
